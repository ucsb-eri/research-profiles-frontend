name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create isolated npm config + cache dir
        run: |
          set -e
          RUNNER_TEMP_DIR="${RUNNER_TEMP:-/tmp}"
          NPM_CACHE_DIR="$RUNNER_TEMP_DIR/npm-cache"
          NPM_CONFIG_FILE="$RUNNER_TEMP_DIR/.npmrc"

          mkdir -p "$NPM_CACHE_DIR"
          cat > "$NPM_CONFIG_FILE" <<EOF
          cache=$NPM_CACHE_DIR
          fund=false
          audit=false
          EOF

          {
            echo "NPM_CONFIG_CACHE=$NPM_CACHE_DIR"
            echo "npm_config_cache=$NPM_CACHE_DIR"
            echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_FILE"
          } >> "$GITHUB_ENV"

          echo "npm cache = $NPM_CACHE_DIR"
          echo "userconfig = $NPM_CONFIG_FILE"

      - name: copy build to the server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*,!.git,!.github,!.gitignore"
          target: /home/research-profiles/production/research-profiles-frontend
          rm: true
      - name: write environment file
        uses: appleboy/ssh-action@v1
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # NEXT_PUBLIC_* are baked in at build time, so this file must exist
          # before `npm run build` below. .env.production.local has the highest
          # precedence and overrides the committed .env.production.
          envs: NEXT_PUBLIC_API_BASE_URL,NEXT_PUBLIC_GOOGLE_CLIENT_ID
          script: |
            cd /home/research-profiles/production/research-profiles-frontend
            umask 077
            {
              [ -n "$NEXT_PUBLIC_API_BASE_URL" ] && printf 'NEXT_PUBLIC_API_BASE_URL=%s\n' "$NEXT_PUBLIC_API_BASE_URL"
              [ -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID" ] && printf 'NEXT_PUBLIC_GOOGLE_CLIENT_ID=%s\n' "$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
            } > .env.production.local
      - name: install dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/research-profiles/production/research-profiles-frontend
            npm install
            npm run build
      - name: restart the service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl --user restart research-profiles-frontend-prod.service
